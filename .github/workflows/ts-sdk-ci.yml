name: ts-sdk-ci

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Verify package contents
        run: npm pack --dry-run

      - name: Pack tarball for smoke test
        id: pack
        run: |
          set -euo pipefail

          package_file="$(npm pack --json | node -e "const fs = require('fs'); const output = JSON.parse(fs.readFileSync(0, 'utf8')); process.stdout.write(output[0].filename);")"
          echo "package_file=${package_file}" >> "${GITHUB_OUTPUT}"

      - name: Smoke test packed SDK
        env:
          PACKAGE_FILE: ${{ steps.pack.outputs.package_file }}
        run: |
          set -euo pipefail

          smoke_dir="$(mktemp -d)"
          cd "${smoke_dir}"
          npm init -y >/dev/null 2>&1
          npm install "${GITHUB_WORKSPACE}/${PACKAGE_FILE}"
          node --input-type=module -e "import { Knowledge2 } from '@knowledge2/sdk'; if (typeof Knowledge2 !== 'function') { throw new Error(\`Expected ESM Knowledge2 export to be a function, got \${typeof Knowledge2}\`); }"
          node -e "const { Knowledge2 } = require('@knowledge2/sdk'); if (typeof Knowledge2 !== 'function') { throw new Error(\`Expected CommonJS Knowledge2 export to be a function, got \${typeof Knowledge2}\`); }"
